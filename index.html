<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Breathing App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
    }
    h1 { margin-top: 20px; }
    .controls button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
    }
    .circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 6px solid white;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .graphs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .graph {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 5px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<h1>Breathing App</h1>

<div class="controls">
  <button onclick="setPattern(4,0,4)">4x4</button>
  <button onclick="setPattern(8,0,4)">8x4</button>
  <button onclick="setPattern(8,7,4)">8x7x4</button>
</div>

<div class="circle" id="mainCircle">Ready</div>

<div class="graphs">
  <div class="graph" id="inhaleCircle">Inhale</div>
  <div class="graph" id="holdCircle">Hold</div>
  <div class="graph" id="exhaleCircle">Exhale</div>
</div>

<div class="controls">
  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
</div>

<script>
let inhale = 4, hold = 0, exhale = 4;
let timer;
let phase = 0;
let timeLeft = inhale;

function setPattern(i,h,e){
  inhale=i; hold=h; exhale=e;
  stop();
  document.getElementById("mainCircle").innerText = "Ready";
}

function start(){
  stop();
  phase = 0;
  timeLeft = inhale;
  run();
}

function stop(){
  clearInterval(timer);
}

function run(){
  timer = setInterval(()=>{
    let phaseName;
    let max;

    if(phase===0){ phaseName="Inhale"; max=inhale; }
    else if(phase===1 && hold>0){ phaseName="Hold"; max=hold; }
    else { phaseName="Exhale"; max=exhale; }

    document.getElementById("mainCircle").innerText = phaseName + " " + timeLeft;

    updateCircle("inhaleCircle", phase===0, inhale, timeLeft);
    updateCircle("holdCircle", phase===1, hold, timeLeft);
    updateCircle("exhaleCircle", phase===2 || (phase===1 && hold===0), exhale, timeLeft);

    timeLeft--;

    if(timeLeft<0){
      phase++;
      if(phase===1 && hold===0) phase=2;
      if(phase>2) phase=0;

      if(phase===0) timeLeft=inhale;
      else if(phase===1) timeLeft=hold;
      else timeLeft=exhale;
    }

  },1000);
}

function updateCircle(id, active, max, current){
  let el = document.getElementById(id);
  if(max===0){
    el.style.background="";
    return;
  }
  let percent = ((max-current)/max)*100;
  el.style.background = active ? 
    `conic-gradient(#0f0 ${percent}%, #333 ${percent}%)` : "";
}
</script>

</body>
</html>
