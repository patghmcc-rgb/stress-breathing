<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathora Test</title>
  <style>
    :root{
      --text:#eef7ff;
      --card:rgba(10,18,28,.55);
      --line:rgba(255,255,255,.12);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,210,120,.35), transparent 20%),
        linear-gradient(180deg, #0a1622 0%, #14324a 45%, #1b4b63 100%);
    }

    .bg{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
    }

    .blob{
      position:absolute;
      border-radius:50%;
      filter:blur(40px);
      opacity:.75;
      animation: drift 10s ease-in-out infinite alternate;
    }

    .b1{
      width:280px;height:280px;
      left:5%;top:10%;
      background:rgba(70, 220, 255, .55);
    }

    .b2{
      width:320px;height:320px;
      right:8%;top:18%;
      background:rgba(255, 170, 70, .45);
      animation-duration:14s;
    }

    .b3{
      width:260px;height:260px;
      left:22%;bottom:8%;
      background:rgba(90, 255, 170, .40);
      animation-duration:12s;
    }

    .b4{
      width:300px;height:300px;
      right:18%;bottom:10%;
      background:rgba(170, 120, 255, .35);
      animation-duration:16s;
    }

    .ring{
      position:absolute;
      left:50%;top:50%;
      width:180px;height:180px;
      margin-left:-90px;margin-top:-90px;
      border:2px solid rgba(255,255,255,.18);
      border-radius:50%;
      animation:ripple 6s linear infinite;
    }

    .ring.r2{ animation-delay: 3s; }

    @keyframes drift{
      from{ transform:translate(0,0) scale(1); }
      to{ transform:translate(35px,-25px) scale(1.12); }
    }

    @keyframes ripple{
      from{ transform:scale(.7); opacity:.35; }
      to{ transform:scale(4); opacity:0; }
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      z-index:1;
    }

    .card{
      width:min(900px, 100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      backdrop-filter:blur(10px);
      padding:28px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 8px;
      font-size:36px;
    }

    .sub{
      margin:0 0 22px;
      color:#d1e6f8;
      font-size:18px;
    }

    .orb-wrap{
      height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .orb{
      width:180px;
      height:180px;
      border-radius:50%;
      transition:all .8s ease;
      box-shadow:
        inset -16px -20px 35px rgba(0,0,0,.22),
        inset 12px 14px 24px rgba(255,255,255,.14),
        0 0 45px rgba(255,255,255,.18);
      background:linear-gradient(180deg, #ef4444, #b91c1c);
      position:relative;
    }

    .orb::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.45), transparent 22%);
    }

    .status{
      font-size:28px;
      font-weight:800;
      margin:10px 0 6px;
    }

    .count{
      font-size:56px;
      font-weight:800;
      margin:0 0 20px;
    }

    .controls{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:16px;
      padding:14px 20px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .start{ background:#7dd3fc; color:#062135; }
    .stop{ background:#e2e8f0; color:#0b2238; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
    <div class="ring"></div>
    <div class="ring r2"></div>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Breathora Test</h1>
      <p class="sub">If this works, background and sound are fixed.</p>

      <div class="orb-wrap">
        <div class="orb" id="orb"></div>
      </div>

      <div class="status" id="status">Ready</div>
      <div class="count" id="count">0</div>

      <div class="controls">
        <button class="start" id="startBtn">Start Test</button>
        <button class="stop" id="stopBtn">Stop</button>
      </div>
    </div>
  </div>

  <script>
    let timer = null;
    let phaseIndex = 0;
    let count = 0;
    let audioCtx = null;

    const phases = [
      { name: "Inhale", seconds: 4, startHue: 0, endHue: 220, scaleStart: 0.9, scaleEnd: 1.18 },
      { name: "Hold", seconds: 4, startHue: 220, endHue: 40, scaleStart: 1.18, scaleEnd: 1.18 },
      { name: "Exhale", seconds: 4, startHue: 40, endHue: 0, scaleStart: 1.18, scaleEnd: 0.9 }
    ];

    const orb = document.getElementById("orb");
    const statusEl = document.getElementById("status");
    const countEl = document.getElementById("count");

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function beep() {
      ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime;

      osc.type = "sine";
      osc.frequency.value = 700;
      gain.gain.value = 0.0001;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      gain.gain.linearRampToValueAtTime(0.12, now + 0.01);
      gain.gain.linearRampToValueAtTime(0.0001, now + 0.16);

      osc.start(now);
      osc.stop(now + 0.18);
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.9;
      utter.pitch = 1;
      utter.volume = 1;
      window.speechSynthesis.speak(utter);
    }

    function setOrb(phase, step, total) {
      const progress = (step - 1) / Math.max(total - 1, 1);
      const hue = phase.startHue + (phase.endHue - phase.startHue) * progress;
      const scale = phase.scaleStart + (phase.scaleEnd - phase.scaleStart) * progress;

      orb.style.transform = `scale(${scale})`;
      orb.style.background = `linear-gradient(180deg,
        hsla(${hue}, 82%, 60%, 1),
        hsla(${hue}, 82%, 40%, 1)
      )`;
      orb.style.boxShadow = `
        inset -16px -20px 35px rgba(0,0,0,.22),
        inset 12px 14px 24px rgba(255,255,255,.14),
        0 0 45px hsla(${hue}, 82%, 60%, .35)
      `;
    }

    function runPhase() {
      const phase = phases[phaseIndex];
      let n = 1;

      statusEl.textContent = phase.name;
      countEl.textContent = n;
      setOrb(phase, n, phase.seconds);
      beep();
      speak(`${phase.name}, 2, 3, 4`);

      clearInterval(timer);
      timer = setInterval(() => {
        n++;
        if (n > phase.seconds) {
          clearInterval(timer);
          phaseIndex = (phaseIndex + 1) % phases.length;
          runPhase();
          return;
        }
        countEl.textContent = n;
        setOrb(phase, n, phase.seconds);
      }, 1000);
    }

    document.getElementById("startBtn").onclick = () => {
      phaseIndex = 0;
      runPhase();
    };

    document.getElementById("stopBtn").onclick = () => {
      clearInterval(timer);
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      statusEl.textContent = "Stopped";
      countEl.textContent = "0";
      orb.style.transform = "scale(1)";
    };
  </script>
</body>
</html>
