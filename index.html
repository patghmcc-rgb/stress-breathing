<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Breathora | Professional Stress Reset</title>
  
  <meta name="description" content="A zero-friction breathing tool for high-pressure professionals. No ads, no login, just a reset." />
  <meta property="og:title" content="Breathora - 2 Minute Reset" />
  <meta property="og:description" content="A high-performance breathing utility for workplace resets." />
  <meta property="og:type" content="website" />
  
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Breathora" />

  <style>
    :root {
      --bg-top: #09131d;
      --bg-mid: #17334a;
      --bg-low: #2f5d6e;
      --bg-bottom: #467679;
      --text: #eef6fb;
      --muted: #c4d4de;
      --card: rgba(8, 16, 24, .22);
      --line: rgba(255, 255, 255, .10);
      --shadow: 0 24px 70px rgba(0, 0, 0, .28);
      --btn: #9ad8ff;
      --btn-text: #062135;
      --accent: #8fd3ff;
    }

    body.light {
      --bg-top: #edf7ff;
      --bg-mid: #d6ebf8;
      --bg-low: #c7e3ea;
      --bg-bottom: #b8d8d1;
      --text: #13202b;
      --muted: #4e6575;
      --card: rgba(255, 255, 255, .46);
      --line: rgba(13, 32, 43, .10);
      --shadow: 0 18px 50px rgba(0, 0, 0, .10);
      --btn: #2d88b8;
      --btn-text: #f5fbff;
      --accent: #2d88b8;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 34%, var(--bg-low) 72%, var(--bg-bottom) 100%);
      overflow-x: hidden;
    }

    .bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .sun-halo {
      position: absolute; width: 640px; height: 640px; left: 28%; top: 2%; transform: translateX(-50%);
      border-radius: 50%; background: radial-gradient(circle, rgba(255, 228, 170, .56) 0%, rgba(255, 190, 110, .30) 30%, transparent 70%);
      filter: blur(18px); animation: sunBreath 14s ease-in-out infinite;
    }

    .sun {
      position: absolute; width: 160px; height: 160px; left: 28%; top: 9%; transform: translateX(-50%);
      border-radius: 50%; background: radial-gradient(circle at 40% 34%, #fffcee 0%, #ffbd68 100%);
      box-shadow: 0 0 72px rgba(255, 190, 110, .24);
    }

    .mountains { position: absolute; inset: auto 0 0 0; height: 48%; }
    .mountain { position: absolute; left: -10%; width: 120%; border-radius: 50% 50% 0 0 / 100% 100% 0 0; }
    .mountain.back { bottom: 8%; height: 34%; background: linear-gradient(180deg, rgba(22, 50, 61, .88), rgba(13, 31, 41, .98)); }
    .mountain.mid { bottom: 0; height: 42%; background: linear-gradient(180deg, rgba(16, 40, 50, .98), rgba(8, 21, 30, 1)); }
    .mountain.front { bottom: -6%; height: 28%; background: linear-gradient(180deg, rgba(10, 26, 34, .99), rgba(5, 15, 23, 1)); }

    .page { position: relative; z-index: 1; width: min(1280px, 100%); margin: 0 auto; padding: 20px; }
    .toolbar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 14px; }
    .ghost-btn { border: 1px solid var(--line); background: var(--card); color: var(--text); border-radius: 14px; padding: 10px 14px; cursor: pointer; font-weight: 700; backdrop-filter: blur(14px); }

    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 30px; box-shadow: var(--shadow); backdrop-filter: blur(16px); }
    
    /* Hero/Cover Section */
    .cover { display: grid; grid-template-columns: 1.1fr .9fr; gap: 20px; min-height: calc(100vh - 90px); }
    .cover.hidden { display: none; }
    .hero { padding: 34px; display: flex; flex-direction: column; justify-content: center; }
    .title { font-size: 54px; line-height: .95; margin: 0 0 16px; }
    .subtitle { color: var(--muted); font-size: 18px; line-height: 1.55; margin: 0 0 26px; }

    /* App Shell Section */
    .app-shell { display: none; grid-template-columns: 390px 1fr; gap: 22px; margin-top: 8px; }
    .app-shell.active { display: grid; }
    .sidebar { padding: 22px; }
    .main { padding: 26px; display: flex; flex-direction: column; gap: 22px; align-items: center; }

    .logo { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(180deg, #95d7ff, #2463e8); margin-bottom: 10px; }
    
    /* Orb Styling */
    .orb-wrap { position: relative; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
    .orb { 
      width: 200px; height: 200px; border-radius: 50%; background: rgba(154, 216, 255, 0.2); 
      border: 2px solid var(--accent); transition: transform 0.1s linear; 
      display: flex; align-items: center; justify-content: center;
    }
    .orb-center { text-align: center; }
    .phase { font-size: 14px; font-weight: 800; letter-spacing: 2px; }
    .count { font-size: 48px; font-weight: 800; }

    /* Controls */
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
    .btn { padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; }
    .start { background: var(--btn); color: var(--btn-text); }
    .pause { background: #fff; color: #000; }
    .reset { background: rgba(255,255,255,0.1); color: #fff; }

    .time-preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
    .time-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--text); padding: 8px; border-radius: 10px; cursor: pointer; }
    .time-btn.active { background: var(--btn); color: var(--btn-text); }

    @keyframes sunBreath { 0%, 100% { transform: translateX(-50%) scale(1); opacity: .9; } 50% { transform: translateX(-50%) scale(1.05); opacity: 1; } }

    @media (max-width: 900px) {
      .cover, .app-shell { grid-template-columns: 1fr; }
      .title { font-size: 38px; }
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="sun-halo"></div>
    <div class="sun"></div>
    <div class="mountains">
      <div class="mountain back"></div>
      <div class="mountain mid"></div>
      <div class="mountain front"></div>
    </div>
  </div>

  <div class="page">
    <div class="toolbar">
      <button class="ghost-btn" id="themeBtn">Light Mode</button>
      <button class="ghost-btn" id="exitBtn" style="display:none;">Back to Menu</button>
    </div>

    <section class="cover" id="coverSection">
      <div class="panel hero">
        <div class="logo"></div>
        <h1 class="title">Reset stress fast.<br>No apps. No friction.</h1>
        <p class="subtitle">Breathora is built for the truck, the shop, and the moments where you need to steady yourself right now.</p>
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
          <button class="ghost-btn" onclick="startApp('panic')">🚨 Calm Me Now</button>
          <button class="ghost-btn" onclick="startApp('manager')">👨‍💼 Manager Reset</button>
          <button class="ghost-btn" onclick="startApp('box')">📦 Box Breath</button>
        </div>
      </div>
    </section>

    <section class="app-shell" id="appShell">
      <div class="panel sidebar">
        <h3>Technique</h3>
        <div id="techniqueInfo">
          <strong id="activeName">Manager Reset</strong>
          <p id="activeDesc" style="font-size: 14px; color: var(--muted);"></p>
        </div>
        
        <div class="time-preset-grid">
          <button class="time-btn" onclick="setTime(1)">1m</button>
          <button class="time-btn active" id="t2" onclick="setTime(2)">2m</button>
          <button class="time-btn" onclick="setTime(5)">5m</button>
          <button class="time-btn" onclick="setTime(10)">10m</button>
        </div>

        <div class="controls">
          <button class="btn start" id="startBtn">START</button>
          <button class="btn pause" id="pauseBtn">PAUSE</button>
          <button class="btn reset" id="resetBtn">RESET</button>
        </div>
      </div>

      <div class="panel main">
        <div id="timerDisplay" style="font-size: 20px; font-weight: 800;">2:00</div>
        <div class="orb-wrap">
          <div class="orb" id="orb">
            <div class="orb-center">
              <div class="phase" id="phaseLabel">READY</div>
              <div class="count" id="countLabel">0</div>
            </div>
          </div>
        </div>
        <div id="instruction" style="color: var(--muted);">Press Start to Begin</div>
      </div>
    </section>
  </div>

  <script>
    // Configuration
    const modes = {
      panic: { name: 'Panic Mode', desc: 'Physiological Sigh: Double inhale, long exhale.', pattern: [3, 1, 6, 0] },
      manager: { name: 'Manager Reset', desc: 'The 4-6-4: Balanced for workplace composure.', pattern: [4, 4, 6, 0] },
      box: { name: 'Box Breathing', desc: 'Navy SEAL standard: 4-4-4-4 for focus.', pattern: [4, 4, 4, 4] }
    };

    let currentMode = modes.manager;
    let timeLeft = 120;
    let isRunning = false;
    let timerId = null;
    let breathId = null;

    // Elements
    const cover = document.getElementById('coverSection');
    const shell = document.getElementById('appShell');
    const exitBtn = document.getElementById('exitBtn');
    const orb = document.getElementById('orb');
    const phaseLabel = document.getElementById('phaseLabel');
    const countLabel = document.getElementById('countLabel');
    const timerDisplay = document.getElementById('timerDisplay');

    function startApp(modeKey) {
      currentMode = modes[modeKey];
      document.getElementById('activeName').innerText = currentMode.name;
      document.getElementById('activeDesc').innerText = currentMode.desc;
      cover.classList.add('hidden');
      shell.classList.add('active');
      exitBtn.style.display = 'block';
      resetSession();
    }

    exitBtn.onclick = () => {
      stopSession();
      cover.classList.remove('hidden');
      shell.classList.remove('active');
      exitBtn.style.display = 'none';
    };

    function setTime(m) {
      timeLeft = m * 60;
      updateTimerDisplay();
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    }

    function updateTimerDisplay() {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      timerDisplay.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // Breathing Logic
    async function runBreathing() {
      const [inhale, hold, exhale, hold2] = currentMode.pattern;
      
      while(isRunning && timeLeft > 0) {
        // INHALE
        await doPhase('INHALE', inhale, 1, 1.5);
        if (!isRunning) break;
        // HOLD
        if(hold > 0) await doPhase('HOLD', hold, 1.5, 1.5);
        if (!isRunning) break;
        // EXHALE
        await doPhase('EXHALE', exhale, 1.5, 1);
        if (!isRunning) break;
        // HOLD 2 (Box)
        if(hold2 > 0) await doPhase('HOLD', hold2, 1, 1);
      }
    }

    function doPhase(label, duration, startScale, endScale) {
      return new Promise(resolve => {
        let elapsed = 0;
        phaseLabel.innerText = label;
        
        const step = () => {
          if(!isRunning) return resolve();
          elapsed++;
          countLabel.innerText = (duration - elapsed + 1);
          
          // Smooth Scale
          const progress = elapsed / duration;
          const currentScale = startScale + (endScale - startScale) * progress;
          orb.style.transform = `scale(${currentScale})`;

          if(elapsed >= duration) {
            resolve();
          } else {
            setTimeout(step, 1000);
          }
        };
        step();
      });
    }

    function resetSession() {
      stopSession();
      timeLeft = 120;
      updateTimerDisplay();
      orb.style.transform = 'scale(1)';
      phaseLabel.innerText = 'READY';
      countLabel.innerText = '0';
    }

    function stopSession() {
      isRunning = false;
      clearInterval(timerId);
    }

    document.getElementById('startBtn').onclick = () => {
      if(isRunning) return;
      isRunning = true;
      runBreathing();
      timerId = setInterval(() => {
        if(timeLeft > 0) {
          timeLeft--;
          updateTimerDisplay();
        } else {
          stopSession();
          phaseLabel.innerText = "DONE";
        }
      }, 1000);
    };

    document.getElementById('pauseBtn').onclick = () => isRunning = false;
    document.getElementById('resetBtn').onclick = resetSession;

    // Theme Toggle
    document.getElementById('themeBtn').onclick = () => {
      document.body.classList.toggle('light');
      document.getElementById('themeBtn').innerText = 
        document.body.classList.contains('light') ? 'Dark Mode' : 'Light Mode';
    };
  </script>
</body>
</html>
