<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motion Sound Test</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,sans-serif;
      background:black;
      color:white;
    }
    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, magenta);
      background-size:400% 400%;
      animation:move 4s linear infinite;
    }
    @keyframes move{
      0%{filter:hue-rotate(0deg);}
      100%{filter:hue-rotate(360deg);}
    }
    .box{
      position:relative;
      z-index:1;
      background:rgba(0,0,0,.55);
      padding:30px;
      border-radius:20px;
      text-align:center;
    }
    button{
      font-size:20px;
      padding:14px 22px;
      border:none;
      border-radius:12px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="box">
    <h1>Motion / Sound Test</h1>
    <button onclick="go()">Play Sound</button>
  </div>

  <script>
    let ctx;
    function go(){
      ctx = ctx || new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === "suspended") ctx.resume();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 880;
      gain.gain.value = 0.12;

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    }
  </script>
</body>
</html>
